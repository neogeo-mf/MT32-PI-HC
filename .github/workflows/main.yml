name: Build MT32-PI-HC BulkyMIDI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git cmake make wget xz-utils gcc-arm-none-eabi

      - name: Install AArch64 bare-metal toolchain
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-elf.tar.xz
          tar -xf arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-elf.tar.xz
          echo "$PWD/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-elf/bin" >> $GITHUB_PATH

      - name: Fetch external dependencies
        run: |
          mkdir -p external
          git clone --depth 1 https://github.com/smuehlst/circle-stdlib external/circle-stdlib
          git clone --depth 1 https://github.com/munt/munt.git external/munt
          git clone --depth 1 https://github.com/benhoyt/inih.git external/inih
          git clone --depth 1 https://github.com/FluidSynth/fluidsynth.git external/fluidsynth

          git -C external/circle-stdlib submodule update --init --depth 1 libs/circle libs/circle-newlib
          git -C external/circle-stdlib/libs/circle submodule update --init --depth 1 addon/wlan/hostap

      - name: Build firmware
        run: |
          make clean || true
          make

      - name: Upload kernel8.img
        uses: actions/upload-artifact@v4
        with:
          name: mt32pi-bulkymidi-build
          path: kernel8.img
